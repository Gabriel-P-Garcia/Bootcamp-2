<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="Icone_lista.png">
</head>
<body>

    <h1>Minha Lista de Compras</h1>
    
    <div class="input-group">
        <input type="text" id="itemInput" placeholder="Adicione seu item">
        <button onclick="adicionarItem()">Adicionar</button>
    </div>

    <ul id="listaAtual"></ul>
    
    <button id="btn-historico" onclick="salvarHistorico()">Salvar Itens Marcados no Histórico</button>

    <div class="section-divider"></div>

    <h2>Histórico (Compras Futuras)</h2>
    <p class="subtitle-text">Itens frequentes. Clique em "Voltar para Lista" para comprar novamente.</p>
    <ul id="listaHistorico"></ul>

    <script src="codigo.js"></script>

    <!-- Seção de Sincronização na Nuvem -->
    <div style="background: #e3f2fd; padding: 15px; border-radius: 4px; margin-top: 20px;">
        <h3 style="margin-top: 0; color: #1565c0; font-size: 16px;">Salvar sua lista (Guarde o código para ver a lista em outros dispositivos)</h3>
        
        <button onclick="salvarNaNuvem()" style="background-color: #1976d2; margin-bottom: 10px;">
            Subir Lista para a Nuvem
        </button>
        
        <div style="display: flex; gap: 10px;">
            <input type="text" id="inputNuvem" placeholder="Cole o código da lista aqui">
            <button onclick="carregarDaNuvem()" style="background-color: #ff9800;">Baixar Lista</button>
        </div>
    </div>

</body>

<footer>
    <div class="versao">
        Lista de Compras v2.0.0 - <a href="https://github.com/Gabriel-P-Garcia/Bootcamp-2" target="_blank">Documentação</a>
    </div>
</footer>
</html>
